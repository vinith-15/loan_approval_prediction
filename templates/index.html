<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan Approval Prediction</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #121212;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        .container-box {
            height: 100vh;
        }

        .card {
            background-color: #1e1e1e;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            color: white;
        }

        h2 {
            font-weight: 600;
        }

        .form-control {
            background-color: #2a2a2a;
            border: none;
            color: white;
            border-radius: 10px;
            padding: 10px;
        }

        .form-control::placeholder {
            color: #aaa;
        }

        .form-control:focus {
            background-color: #2a2a2a;
            color: white;
            box-shadow: 0 0 5px #667eea;
        }

        select.form-control {
            color: white;
        }

        .btn-custom {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border-radius: 10px;
            font-weight: 500;
            border: none;
        }

        .btn-custom:hover {
            opacity: 0.9;
        }

        .result-box {
            background-color: #2a2a2a;
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center container-box">
    
    <div class="card p-4" style="width: 420px;">
        
        <h2 class="text-center mb-4">Loan Approval Prediction</h2>

        <form action="/predict" method="post">

            <input type="number" name="age" class="form-control mb-3" placeholder="👤 Age" required>

            <input type="number" name="income" class="form-control mb-3" placeholder="💰 Income" required>

            <input type="number" name="loan" class="form-control mb-3" placeholder="🏦 Loan Amount" required>

            <input type="number" name="credit" class="form-control mb-3" placeholder="📊 Credit Score" required>

            <select name="employment" class="form-control mb-4">
                <option value="Salaried">👔 Salaried</option>
                <option value="Self-Employed">💼 Self-Employed</option>
            </select>

            <button type="submit" class="btn btn-custom w-100">🚀 Predict</button>

        </form>

        {% if prediction_text %}
        <div class="result-box text-center">
            {{ prediction_text }}
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
